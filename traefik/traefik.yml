# traefik/traefik.yml
# Static configuration -- requires Traefik restart to take effect

global:
  checkNewVersion: false
  sendAnonymousUsage: false

log:
  level: INFO
  format: json

accessLog:
  format: json
  fields:
    defaultMode: keep
    headers:
      defaultMode: drop
      names:
        Authorization: redact

api:
  dashboard: true
  insecure: false   # Dashboard only via internal network

ping:
  entryPoint: ping

entryPoints:
  # HTTP -- redirect all to HTTPS
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

  # HTTPS -- TLS 1.3 only
  websecure:
    address: ":443"
    http:
      tls:
        options: tlsOptions
    transport:
      respondingTimeouts:
        readTimeout: 60s
        writeTimeout: 60s
        idleTimeout: 180s

  # Internal ping only (not routed externally)
  ping:
    address: ":8081"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: cbom-frontend
    watch: true
  file:
    filename: /etc/traefik/dynamic.yml
    watch: true

# Self-signed certificate
tls:
  certificates:
    - certFile: /certs/server.crt
      keyFile: /certs/server.key
