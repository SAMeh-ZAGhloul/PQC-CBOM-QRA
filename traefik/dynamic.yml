# traefik/dynamic.yml
# Dynamic configuration -- reloaded without Traefik restart

# TLS options: enforce TLS 1.3 minimum, restrict cipher suites
tls:
  options:
    tlsOptions:
      minVersion: VersionTLS13
      cipherSuites:
        - TLS_AES_256_GCM_SHA384
        - TLS_CHACHA20_POLY1305_SHA256
        - TLS_AES_128_GCM_SHA256
      sniStrict: false       # Allow IP-based access for MVP (self-signed)
      curvePreferences:
        - X25519
        - CurveP384
        - CurveP256

# Security headers middleware
http:
  middlewares:
    security-headers:
      headers:
        frameDeny: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "strict-origin-when-cross-origin"
        permissionsPolicy: "camera=(), microphone=(), geolocation=()"
        customResponseHeaders:
          Strict-Transport-Security: "max-age=63072000; includeSubDomains"
          X-Content-Type-Options: "nosniff"
          X-Frame-Options: "DENY"
          Content-Security-Policy: >
            default-src 'self';
            script-src 'self' 'unsafe-inline';
            style-src 'self' 'unsafe-inline';
            img-src 'self' data:;
            connect-src 'self' wss:;
            font-src 'self'

    # Rate limiter for API endpoints
    api-ratelimit:
      rateLimit:
        average: 100
        burst: 50
        period: 1s

    # Strip /minio prefix when routing to MinIO console
    minio-stripprefix:
      stripPrefix:
        prefixes:
          - "/minio"

  routers:
    api:
      rule: "PathPrefix(`/api`) || PathPrefix(`/auth`) || PathPrefix(`/metrics`)"
      service: api-service
      entryPoints:
        - websecure
      tls:
        options: tlsOptions
      middlewares:
        - security-headers
        - api-ratelimit

    health:
      rule: "Path(`/health`)"
      service: api-service
      entryPoints:
        - websecure
      tls:
        options: tlsOptions
      middlewares:
        - security-headers

    # Dashboard -- internal access only (no external route)
    dashboard:
      rule: "Host(`traefik.internal`)"
      service: "api@internal"
      entryPoints:
        - websecure
      tls:
        options: tlsOptions
      middlewares:
        - security-headers

  services:
    api-service:
      loadBalancer:
        servers:
          - url: "http://api:8000"
